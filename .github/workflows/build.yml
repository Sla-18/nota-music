name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar dependências
        run: npm install

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.6"

      - name: Gerar gradle-wrapper.jar
        run: |
          cd android
          gradle wrapper --gradle-version 8.6
          chmod +x gradlew

      - name: Criar keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/app/nota-music.keystore \
            -alias nota-music \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass notamusic123 \
            -keypass notamusic123 \
            -dname "CN=Nota Music, OU=Dev, O=Nota, L=Maputo, S=Maputo, C=MZ"

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PASSWORD: notamusic123
          KEY_ALIAS: nota-music
          KEY_PASSWORD: notamusic123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nota-music-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
