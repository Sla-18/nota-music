android {
    namespace "com.notamusic"
    compileSdkVersion 34
    buildToolsVersion "34.0.0"

    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        applicationId "com.notamusic"
        minSdkVersion 24
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug { debuggable true }
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}
