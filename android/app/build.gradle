apply plugin: "com.android.application"

repositories {
    google()
    mavenCentral()
    maven { url "https://jitpack.io" }
}

android {
    namespace "com.notamusic"
    compileSdkVersion 34
    buildToolsVersion "34.0.0"

    buildFeatures {
        buildConfig true
    signingConfigs {
    release {
        storeFile file("nota-music.keystore")
        storePassword System.getenv("KEYSTORE_PASSWORD") ?: "notamusic123"
        keyAlias System.getenv("KEY_ALIAS") ?: "nota-music"
        keyPassword System.getenv("KEY_PASSWORD") ?: "notamusic123"
    }
}

buildTypes {
    debug { debuggable true }
    release {
        signingConfig signingConfigs.release
        minifyEnabled false
        proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
    }
}
    }

    defaultConfig {
        applicationId "com.notamusic"
        minSdkVersion 24
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug { debuggable true }
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android:0.73.6")
    implementation("com.facebook.react:hermes-android:0.73.6")
}
